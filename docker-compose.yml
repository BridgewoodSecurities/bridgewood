services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bridgewood
      POSTGRES_USER: bridgewood
      POSTGRES_PASSWORD: bridgewood
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://bridgewood:bridgewood@postgres:5432/bridgewood
      ADMIN_TOKEN: bridgewood-admin-token
      FERNET_KEY: p63UvtXx1b9s_9g9qxGzbXClSH6sF8RClbQfmykUKQ8=
      MOCK_BROKER_MODE: "true"
      PRICE_REFRESH_SECONDS: "15"
      SNAPSHOT_INTERVAL_MINUTES: "5"
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
